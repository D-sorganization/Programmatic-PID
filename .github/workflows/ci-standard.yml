name: CI Standard

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install quality tools
        run: pip install --force-reinstall ruff==0.14.10 black==25.12.0 mypy==1.13.0 bandit==1.7.7

      - name: Check tool version consistency
        shell: powershell
        run: |
          Write-Host "Validating tool versions match .pre-commit-config.yaml..."
          $preCommitConfig = Get-Content .pre-commit-config.yaml -Raw
          if ($preCommitConfig -notmatch "rev:\s*25\.12\.0") {
            Write-Error "Black version mismatch between CI and pre-commit config"
            exit 1
          }
          if ($preCommitConfig -notmatch "rev:\s*v0\.14\.10") {
            Write-Error "Ruff version mismatch between CI and pre-commit config"
            exit 1
          }
          if ($preCommitConfig -notmatch "rev:\s*v1\.13\.0") {
            Write-Error "MyPy version mismatch between CI and pre-commit config"
            exit 1
          }
          Write-Host "All tool versions consistent"

      - name: Lint
        run: ruff check src/ tests/

      - name: Check formatting
        run: black --check src/ tests/

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Type check
        run: echo "mypy skipped - baseline code not yet fully typed (planned improvement)"
        continue-on-error: true

      - name: Security scan
        run: bandit -r src/ tests/ -ll -ii

      - name: Verify no placeholders
        shell: powershell
        run: |
          $matches = Get-ChildItem -Path src, tests -Recurse -Filter *.py | Select-String -Pattern "TODO|FIXME"
          if ($matches) {
            $matches
            Write-Error "Unresolved TODOs/FIXMEs found. Create GitHub issues instead."
            exit 1

  security-scan:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit python dependencies
        run: pip-audit -r requirements.txt --progress-spinner=off

  tests:
    needs: quality-gate
    runs-on: self-hosted
    timeout-minutes: 20
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: python -m pytest -p no:xvfb tests/ -v --cov=programmatic_pid --cov-report=xml --cov-report=term-missing

      - uses: codecov/codecov-action@v5
        if: ${{ env.CODECOV_TOKEN != '' }}
        with:
          token: ${{ env.CODECOV_TOKEN }}
          fail_ci_if_error: false
