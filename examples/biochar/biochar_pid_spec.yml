    layer: instruments

  - id: TT-110
    type: temperature_transmitter
    tag: TT-110
    service: Combustor temperature
    x: 157
    y: 88
    attach_to: BR-101
    layer: instruments

  - id: AO-101
    type: oxygen_analyzer
    tag: O2-101
