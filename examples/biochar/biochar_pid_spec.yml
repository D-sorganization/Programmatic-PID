    layer: instruments

  - id: TT-107
    type: temperature_transmitter
    tag: TT-107
    service: Cooling water inlet temperature
    x: 80
    y: 28
    attach_to_stream: S-009
    layer: instruments

  - id: TT-108
    type: temperature_transmitter
    tag: TT-108
    service: Cooling water outlet temperature
    x: 138
    y: 28
    attach_to_stream: S-010
    layer: instruments

  - id: TT-105
    type: temperature_transmitter
    tag: TT-105
    service: Hot char inlet temperature
    x: 116
