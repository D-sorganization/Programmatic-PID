    layer: instruments

  - id: LT-102
    type: level_switch_low
    tag: LT-102
    service: Low hopper level
    x: 10
    y: 122
    attach_to: HP-101
    layer: instruments

  - id: TT-111
    type: temperature_transmitter
    tag: TT-111
    service: Dryer inlet gas temperature
    x: 58
    y: 112
    attach_to: DR-101
    layer: instruments

  - id: TT-112
    type: temperature_transmitter
    tag: TT-112
    service: Dryer outlet gas temperature
    x: 86
    y: 112
    attach_to: DR-101
    layer: instruments

  - id: PT-101
    type: pressure_transmitter
    tag: PT-101
    service: Reactor pressure
    x: 89
    y: 110
    attach_to: V-101
    layer: instruments

  - id: TT-102
    type: temperature_transmitter
    tag: TT-102
    service: Reactor upper zone temperature
    x: 127
    y: 106
    attach_to: V-101
    layer: instruments

  - id: TT-103
    type: temperature_transmitter
    tag: TT-103
    service: Reactor mid-zone temperature
    x: 127
    y: 88
