control_loops:
  - id: PIC-101
    tag: PIC-101
    description: Maintain retort at slight positive pressure
    measurement: PT-101
    final_element: FN-101
    line_layer: control_lines
    note: Setpoint about +0.5 psig with stable controlled venting

  - id: TIC-103
    tag: TIC-103
    description: Maintain reactor mid-zone temperature
    measurement: TT-103
    final_element: BR-101
    line_layer: control_lines
    note: Manipulate oxidizer duty / raw gas combustion rate

  - id: TIC-111
    tag: TIC-111
    description: Dryer inlet temperature trim
    measurement: TT-111
    final_element: DR-101
    line_layer: control_lines
    note: Use hot-gas bypass or dampers

  - id: TSH-106
    tag: TSH-106
    description: High char outlet temperature shutdown permissive
    measurement: TT-106
    final_element: AG-101
    line_layer: control_lines
    note: Stop discharge to bin if too hot

  - id: FSL-101
    tag: FSL-101
    description: Loss of cooling water flow trip
    measurement: FS-101
    final_element: AG-101
    line_layer: control_lines
    note: Stop feed and maintain safe cooldown

interlocks:
  - id: I-001
    trigger: PT-101 high positive pressure
    action: Stop feed RV-101, maintain burnout path, alarm operator
  - id: I-002
    trigger: Burner flame failure at BR-102
    action: Isolate startup fuel and alarm
  - id: I-003
    trigger: FS-101 no flow
    action: Stop feed, keep cooling permissive logic active, alarm
  - id: I-004
    trigger: TT-106 high-high
    action: Stop transfer to BN-101 and alarm
  - id: I-005
    trigger: RV-101 or RV-102 overload
    action: Stop upstream feed and alarm
  - id: I-006
    trigger: CO-101 alarm
    action: Controlled shutdown and area alarm

annotations:
  notes_panel:
    x: 150
    y: 10
    width: 78
    height: 34
    title: Key Notes
    bullets:
      - Closed-top retort with controlled positive pressure
      - Dryer upstream of reactor feed
      - Independent relief and dedicated vent path required
      - No routine ambient-air pulse into hot solids
      - No cooling air under hot char valve
      - Metered process air and stable pressure control
      - Blower path is operational, not the sole pressure protection path
